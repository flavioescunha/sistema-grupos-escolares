<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Trocar senha - Sistema de Grupos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Trocar senha</h1>
            <p>Você entrou com uma senha temporária. Antes de continuar, defina uma nova senha.</p>

            <form onsubmit="trocarSenhaTemporaria(event)">
                <label for="new_password">Nova senha</label>
                <input type="password" id="new_password" minlength="6" required>

                <label for="confirm_password">Confirmar nova senha</label>
                <input type="password" id="confirm_password" minlength="6" required>

                <button type="submit">Salvar nova senha</button>
            </form>

            <p id="msg"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
